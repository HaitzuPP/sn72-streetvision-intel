name: refresh-data
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Regenerate data.json + holders_seen.json
        env:
          TAO_KEY: ${{ secrets.TAO_KEY }}
          TAO_SECRET: ${{ secrets.TAO_SECRET }}
          TAOSTATS_API_KEY: ${{ secrets.TAOSTATS_API_KEY }}
        run: python3 refresh.py
      - name: Regenerate trades_data.json
        env:
          TAOSTATS_API_KEY: ${{ secrets.TAOSTATS_API_KEY }}
        run: python3 backfill_trades.py
      - name: Commit if changed
        run: |
          git config user.name "sn72-bot"
          git config user.email "bot@pylon.partners"
          git add data.json holders_seen.json trades_data.json
          git diff --staged --quiet || git commit -m "auto: refresh $(date -u +%FT%TZ)"
          git push
